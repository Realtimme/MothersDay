<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Love Letter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/index.css">
</head>
<body>
    <div class="container">
        <div class="floating-hearts" id="hearts-container"></div>
        
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="shine"></div>
                <div class="flap"></div>
                <div class="letter">
                    <div class="heart"></div>
                    <div class="text">
                        <p>I want to say many things,<br>but I can't express them well.<br>So I made this for you.</p>
                        <a href="poem.html" class="btn">Open Letter</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text1">
            <h2>Hey! I have something special for you</h2>
            <p class="instruction">Hover over the envelope to open it</p>
        </div>
    </div>

    <script src="JS/index.js"></script>
</body>
</html>
